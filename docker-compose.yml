version: "3.8"

services:
  db:
    image: postgres:16
    container_name: mois-db
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mois-api
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: mois_portal
      DB_USER: portal_app
      DB_PASSWORD: "P0rtal#DB@2026!"
      ALLOWED_ORIGINS: '["http://localhost","http://localhost:3000","http://127.0.0.1"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: mois-web
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: mois-nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - web

volumes:
  pgdata:
