version: "3.8"

services:
  db:
    image: postgres:16
    container_name: mois-db
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: mois-api
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: mois_portal
      DB_USER: portal_app
      DB_PASSWORD: "P0rtal#DB@2026!"
      ALLOWED_ORIGINS: '["http://localhost","http://localhost:3000","http://127.0.0.1"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: mois-web
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: mois-nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - web

  # ── Asset 03: Complaint Intake ──────────────────────────────────────────────

  complaint-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.complaint-api
    container_name: mois-complaint-api
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: complaint_db
      DB_USER: complaint_rw
      DB_PASSWORD: "Compl@int_RW_2026!"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_access
      MINIO_SECRET_KEY: minio_secret123
      MINIO_BUCKET: complaints
      MINIO_SECURE: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_QUEUE: complaint_processing
      ADMIN_TOKEN: admin-token-mois-2026
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  complaint-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.complaint-web
    container_name: mois-complaint-web
    depends_on:
      db:
        condition: service_healthy

  complaint-nginx:
    image: nginx:alpine
    container_name: mois-complaint-nginx
    volumes:
      - ./docker/complaint-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - complaint-api
      - complaint-web

  # ── Asset 06: Complaint Processing (Celery worker) ─────────────────────────

  complaint-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.complaint-worker
    container_name: mois-complaint-worker
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_access
      MINIO_SECRET_KEY: minio_secret123
      MINIO_BUCKET: complaints
      MINIO_USE_SSL: "false"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: complaint_db
      DB_USER: app_service
      DB_PASSWORD: "Sup3rS3cr3t!"
      PROCESSING_TEMP_DIR: /tmp/processing
      LIBREOFFICE_PATH: /usr/bin/soffice
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy

  # ── Shared infrastructure ───────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: mois-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: mois-minio
    environment:
      MINIO_ROOT_USER: minio_access
      MINIO_ROOT_PASSWORD: minio_secret123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: mois-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio_access minio_secret123 &&
      mc mb local/complaints --ignore-existing &&
      echo 'Bucket created'
      "

volumes:
  pgdata:
  miniodata:
