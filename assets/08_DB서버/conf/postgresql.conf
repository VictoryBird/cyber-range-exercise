# =============================================================
# DB 서버 — PostgreSQL 메인 설정
# IP: 192.168.100.20
#
# [VULN-DB-02] 0.0.0.0 바인딩 — INT 전체 서브넷에서 접근 가능
# [VULN-DB-03] log_statement = 'none' — 쿼리 로깅 비활성
# =============================================================

# 연결 설정
listen_addresses = '*'
port = 5432
max_connections = 100

# 메모리
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 4MB
maintenance_work_mem = 64MB

# WAL
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# [VULN-DB-03] 로깅 설정 — 의도적으로 최소 로깅
# 올바른 설정: log_statement = 'all', log_connections = on
logging_collector = on
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-15-main.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_line_prefix = '%t [%p]: '
log_statement = 'none'
log_min_duration_statement = -1
log_connections = off
log_disconnections = off

# shared_preload_libraries — pgaudit 미포함 (블루팀이 수동 활성화)
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements 설정
pg_stat_statements.max = 1000
pg_stat_statements.track = all

# 로케일
lc_messages = 'en_US.UTF-8'
lc_monetary = 'ko_KR.UTF-8'
lc_numeric = 'ko_KR.UTF-8'
lc_time = 'ko_KR.UTF-8'

# 기타
datestyle = 'iso, mdy'
timezone = 'Asia/Seoul'
default_text_search_config = 'pg_catalog.english'
