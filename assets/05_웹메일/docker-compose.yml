# ============================================================
# docker-compose.yml — 웹메일 서버 로컬 테스트용
# ============================================================

services:
  mail:
    image: mois-webmail:latest
    build: .
    container_name: mois-webmail
    hostname: mail.mois.local
    ports:
      - "80:80"       # Roundcube WebUI
      - "8080:8080"   # Roundcube 프록시 포트
      - "25:25"       # SMTP
      - "143:143"     # IMAP
      - "993:993"     # IMAPS
    environment:
      - MAIL_HOST=192.168.100.11
      - MAIL_DOMAIN=mois.local
      - SMTP_PORT=25
      - IMAP_PORT=143
      - IMAPS_PORT=993
    volumes:
      - mail_data:/var/mail/vhosts
      - roundcube_db:/var/lib/roundcube/db
    restart: unless-stopped

volumes:
  mail_data:
  roundcube_db:
