# ============================================================
# Dovecot 인증 메커니즘 설정
# ============================================================

disable_plaintext_auth = no
# [취약 설정] 평문 인증 허용 → IMAP(:143) 연결에서 비밀번호 스니핑 가능
#   → 정상 설정: disable_plaintext_auth = yes

auth_mechanisms = plain login
# [취약 설정] PLAIN/LOGIN만 허용, CRAM-MD5 등 챌린지-응답 미지원
#   → 정상 설정: auth_mechanisms = plain login cram-md5

# 인증 실패 시 지연
auth_failure_delay = 0 secs
# [취약 설정] 인증 실패 지연 없음 → 브루트포스 공격에 취약
#   → 정상 설정: auth_failure_delay = 2 secs

# 인증 정책 검사
auth_policy_check_before_auth = no
auth_policy_check_after_auth = no

# LDAP 인증 (AD 서버 연동)
!include auth-ldap.conf.ext

# 패스워드 파일 인증 (AD 미가용 시 폴백)
#!include auth-passwdfile.conf.ext
