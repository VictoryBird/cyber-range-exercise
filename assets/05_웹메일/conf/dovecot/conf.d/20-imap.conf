# ============================================================
# Dovecot IMAP 프로토콜 설정
# ============================================================

protocol imap {
  mail_max_userip_connections = 50
  # [취약 설정] 단일 사용자 IP당 50개 동시 IMAP 연결 허용
  #   → 대량 메일 추출에 유리
  #   → 정상 설정: mail_max_userip_connections = 10

  imap_idle_notify_interval = 2 mins
}
