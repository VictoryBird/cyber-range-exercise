# ============================================================
# Apache VirtualHost — Roundcube 기본 (내부 직접 접근용)
# 포트: 80 / 도메인: mail.mois.local
# ============================================================

<VirtualHost *:80>
    ServerName mail.mois.local
    DocumentRoot /var/lib/roundcube/public_html

    <Directory /var/lib/roundcube/public_html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # PHP-FPM 연동
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # 로그 설정
    ErrorLog ${APACHE_LOG_DIR}/roundcube-error.log
    CustomLog ${APACHE_LOG_DIR}/roundcube-access.log combined

    # [취약 설정] 서버 정보 노출 헤더 미제거
    # ServerSignature Off / ServerTokens Prod 미설정 (기본값: Full)
    #   → 정상 설정: ServerSignature Off, ServerTokens Prod
</VirtualHost>
