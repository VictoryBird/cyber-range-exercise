# ============================================================
# Apache VirtualHost — 메일 포털 게이트 프록시 수신용
# 포트: 8080 / DMZ 프록시(203.238.140.11)에서 전달
# ============================================================

<VirtualHost *:8080>
    ServerName mail.mois.local
    DocumentRoot /var/lib/roundcube/public_html

    <Directory /var/lib/roundcube/public_html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # 프록시 헤더 신뢰 (메일 포털 게이트에서 전달)
    RemoteIPHeader X-Forwarded-For
    RemoteIPTrustedProxy 203.238.140.11

    ErrorLog ${APACHE_LOG_DIR}/roundcube-proxy-error.log
    CustomLog ${APACHE_LOG_DIR}/roundcube-proxy-access.log combined
</VirtualHost>
