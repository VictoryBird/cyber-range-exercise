# =============================================================
# 메일 포털 게이트 — 웹메일 프록시 사이트 설정
# 도메인: webmail.mois.valdoria.gov
# 백엔드: 192.168.100.11:8080 (Roundcube)
#
# [VULN-02-01] 프록시 헤더 신뢰 취약점
# [VULN-02-02] 경로 정규화 우회 (merge_slashes off)
# [VULN-02-03] Host 헤더 라우팅 조작 (server_name _)
# [VULN-02-04] 내부 경로 무단 노출 (/internal/, /admin/)
# =============================================================

# ── HTTP → HTTPS 리다이렉트 ──
server {
    listen 80;
    server_name webmail.mois.valdoria.gov 203.238.140.11 localhost;

    # Docker 테스트 시 HTTP 직접 접근 허용
    access_log /var/log/nginx/webmail_access.log detailed;

    # [VULN-02-01] 클라이언트 제공 헤더를 검증 없이 백엔드로 전달
    # 올바른 설정: proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    proxy_set_header X-Real-IP $http_x_real_ip;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;

    # [VULN-02-02] merge_slashes off — 경로 정규화 우회 허용
    # 올바른 설정: merge_slashes on (기본값)
    merge_slashes off;

    location / {
        proxy_pass http://192.168.100.11:8080;
        proxy_http_version 1.1;
    }

    # [VULN-02-04] 내부 관리 경로가 접근 제어 없이 프록시됨
    # 올바른 설정: deny all; return 403;
    location /internal/ {
        proxy_pass http://192.168.100.11:8080/internal/;
    }

    # [VULN-02-04] 관리자 경로도 접근 제어 없이 노출
    # 올바른 설정: allow 203.238.140.0/24; deny all;
    location /admin/ {
        proxy_pass http://192.168.100.11:8080/admin/;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# ── HTTPS 메인 서버 ──
server {
    listen 443 ssl;

    # [VULN-02-03] server_name에 와일드카드(_) 허용 — 임의의 Host 헤더 수용
    # 올바른 설정: server_name webmail.mois.valdoria.gov; (정확한 도메인만)
    server_name webmail.mois.valdoria.gov _;

    # SSL 설정
    ssl_certificate /etc/nginx/ssl/webmail.crt;
    ssl_certificate_key /etc/nginx/ssl/webmail.key;
    include /etc/nginx/snippets/ssl-params.conf;

    access_log /var/log/nginx/webmail_access.log detailed;

    # [VULN-02-01] 클라이언트 제공 헤더를 검증 없이 백엔드로 전달
    proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    proxy_set_header X-Real-IP $http_x_real_ip;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;

    # [VULN-02-02] merge_slashes off
    merge_slashes off;

    location / {
        proxy_pass http://192.168.100.11:8080;
        proxy_http_version 1.1;
    }

    # [VULN-02-04] 내부 경로 무단 노출
    location /internal/ {
        proxy_pass http://192.168.100.11:8080/internal/;
    }

    location /admin/ {
        proxy_pass http://192.168.100.11:8080/admin/;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
