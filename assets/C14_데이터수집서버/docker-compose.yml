version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: "Ev3nts!C4I#2024"
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_user -d events_db"]
      interval: 5s
      retries: 10

  api:
    image: c14-datacollector:latest
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: events_db
      DB_USER: events_user
      DB_PASS: "Ev3nts!C4I#2024"
      API_KEY: dev-key-12345
      ADMIN_KEY: admin-key-99999
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
