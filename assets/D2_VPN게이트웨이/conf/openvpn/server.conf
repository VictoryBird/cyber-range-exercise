# ============================================================
# D2 VPN 게이트웨이 — OpenVPN 서버 설정
# 자산: vpn.mnd.valdoria.mil (211.57.64.11)
# 사이버 훈련 전용 — 실제 운영 환경 사용 금지
# ============================================================

# ── 리스닝 포트 ──
# UDP 기본 포트
port 1194
proto udp
dev tun

# TCP 폴백은 별도 인스턴스로 구성 (server-tcp.conf 또는 port-share)
# port-share를 통해 443/TCP도 수신
port-share 127.0.0.1 443

# ── 인증서 및 키 ──
ca /etc/openvpn/server/certs/ca.crt
cert /etc/openvpn/server/certs/server.crt
key /etc/openvpn/server/certs/server.key
dh /etc/openvpn/server/certs/dh2048.pem
tls-auth /etc/openvpn/server/certs/ta.key 0

# ── VPN 클라이언트 IP 풀 ──
server 172.20.100.0 255.255.255.0
ifconfig-pool-persist /var/log/openvpn/ipp.txt

# ── 라우팅: 패치관리 서브넷(192.168.120.0/24)만 푸시 ──
push "route 192.168.120.0 255.255.255.0"

# 군 INT(192.168.110.0/24) 및 C4I(192.168.130.0/24) 라우팅 없음 (의도적 차단)
# push "route 192.168.110.0 255.255.255.0"  # 비활성 — 군 INT 접근 차단
# push "route 192.168.130.0 255.255.255.0"  # 비활성 — C4I 접근 차단

# ── DNS 푸시 ──
push "dhcp-option DNS 192.168.120.1"

# ── 클라이언트별 설정 디렉토리 ──
client-config-dir /etc/openvpn/server/ccd

# ── 인증 방식 ──
# [취약점] VULN-D2-01: MFA 미적용 — ID/PW만으로 VPN 접속 가능
# [올바른 설정] plugin /usr/lib/openvpn/radiusplugin.so 등으로 TOTP/RADIUS MFA 연동 필요
auth-user-pass-verify /etc/openvpn/server/auth/auth-script.sh via-env
script-security 3
verify-client-cert none
username-as-common-name

# [취약점] VULN-D2-02: 계정 잠금 미설정 — 무제한 로그인 시도 가능
# [올바른 설정] auth-user-pass-verify에서 실패 횟수 카운팅 및 잠금 로직 구현 필요
# 또는 fail2ban 연동: /etc/fail2ban/jail.d/openvpn.conf

# ── 암호화 ──
cipher AES-256-GCM
auth SHA256
tls-version-min 1.2

# ── 세션 설정 ──
# [취약점] 과도한 세션 유지 시간 (24시간)
# [올바른 설정] reneg-sec 3600 (1시간) 또는 그 이하
reneg-sec 86400
keepalive 10 120

# ── 로깅 ──
status /var/log/openvpn/openvpn-status.log
log-append /var/log/openvpn/openvpn.log
verb 3
mute 20

# ── 권한 ──
user nobody
group nogroup
persist-key
persist-tun

# ── 동시 접속 ──
max-clients 50
duplicate-cn
