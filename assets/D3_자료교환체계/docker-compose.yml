version: '3.8'

services:
  db:
    image: mariadb:10.6                    # 명시적 이미지 이름 (한글 디렉토리 대응)
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-MariaRoot@2024!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER: ${MYSQL_USER:-nextcloud}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-NC@DB2024!}
    volumes:
      - db_data:/var/lib/mysql
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      retries: 10
    networks:
      - nextcloud

  redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    networks:
      - nextcloud

  app:
    image: nextcloud-milshare:latest       # 명시적 이미지 이름 (한글 디렉토리 대응)
    build:
      context: .
      dockerfile_inline: |
        FROM nextcloud:27-apache
        RUN apt-get update && apt-get install -y sudo && rm -rf /var/lib/apt/lists/*
    container_name: nextcloud-app
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nextcloud}
      MYSQL_USER: ${MYSQL_USER:-nextcloud}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-NC@DB2024!}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-NCadmin@2024!}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS:-share.mnd.valdoria.mil 211.57.64.12}
      REDIS_HOST: redis
      REDIS_HOST_PORT: 6379
      # [취약점] VULN-D3-01: 기본 관리자 비밀번호가 .env에 평문 저장
      # 올바른 구현: 비밀번호는 시크릿 매니저 또는 Docker Secret으로 관리
    volumes:
      - nextcloud_data:/var/www/html
      - ./conf/nextcloud/config.php:/var/www/html/config/custom.config.php:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nextcloud

volumes:
  db_data:
  nextcloud_data:

networks:
  nextcloud:
    driver: bridge
