# ============================================================
# AI 어시스턴트 — Docker Compose
# 자산 07 — 192.168.100.13 (ai.mois.local)
# ============================================================
# 서비스: Ollama (LLM 서빙) + OpenWebUI (채팅 UI)
# RAG 인덱서는 호스트에서 직접 실행 (docker 외부)
# ============================================================

version: "3.8"

services:
  # ----------------------------------------------------------
  # Ollama — LLM 서빙 프레임워크
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # GPU 사용 시 아래 주석 해제
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ai-net

  # ----------------------------------------------------------
  # OpenWebUI — 웹 기반 채팅 인터페이스
  # ----------------------------------------------------------
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET_KEY:-changeme-openwebui-secret-key}
      # LDAP/AD 인증 설정
      # [취약점] VULN-07-04: AD 자격증명으로 로그인 가능 — 탈취된 자격증명 재사용
      # [올바른 구현] 별도 로컬 계정 체계 사용 또는 MFA 적용
      - WEBUI_AUTH_TYPE=ldap
      - LDAP_SERVER_HOST=${LDAP_SERVER:-ldap://192.168.100.10:389}
      - LDAP_SEARCH_BASE=${LDAP_BASE_DN:-dc=mois,dc=local}
      - LDAP_SEARCH_FILTER=(sAMAccountName={username})
      - LDAP_BIND_DN=${LDAP_BIND_DN:-cn=ai-service,ou=ServiceAccounts,dc=mois,dc=local}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:-AiSvc2024!@#}
      # RAG 설정 — 시스템 프롬프트
      - RAG_ENABLED=true
      - DEFAULT_MODELS=llama3
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - ai-net

volumes:
  ollama_data:
    driver: local
  openwebui_data:
    driver: local

networks:
  ai-net:
    driver: bridge
