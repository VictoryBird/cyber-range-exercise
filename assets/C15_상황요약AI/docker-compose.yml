version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      retries: 30
      start_period: 30s

  summary-api:
    image: c15-summary-ai:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      C4I_API_URL: http://192.168.130.12:8000
      C4I_API_KEY: dev-key-12345
      SUMMARY_OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3:8b
      BRIEFING_DIR: /opt/summary-ai/data/briefings
      LOG_FILE: /opt/summary-ai/logs/pipeline.log
      PIPELINE_DIR: /opt/summary-ai/scripts
    volumes:
      - briefings:/opt/summary-ai/data/briefings
      - logs:/opt/summary-ai/logs
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  briefings:
  logs:
