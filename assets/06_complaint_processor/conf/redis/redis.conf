# Redis Configuration - Complaint Processing Server
# [취약 설정] VULN-07: Redis without authentication

bind 0.0.0.0
# [취약 설정] requirepass is not set - anyone on the network can connect
# 올바른 설정: requirepass StrongRedisPassword123!

protected-mode no    # [취약 설정] Protected mode disabled
# 올바른 설정: protected-mode yes

port 6379

# Logging
logfile /var/log/redis/redis-server.log
loglevel notice

# Persistence
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /var/lib/redis

# [취약 설정] Dangerous commands NOT disabled
# 올바른 설정:
# rename-command CONFIG ""
# rename-command SLAVEOF ""
# rename-command DEBUG ""
# rename-command FLUSHALL ""
# rename-command MODULE ""
