{% extends "base.html" %}

{% block title %}검색 결과{% endblock %}
{% block nav_search %}active{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4><i class="bi bi-search"></i> 통합 검색</h4>
</div>

<div class="card mb-4">
    <div class="card-body">
        <form action="{% url 'search' %}" method="get" class="row g-3">
            <div class="col-md-8">
                <input type="text" class="form-control" name="keyword" id="searchKeyword"
                       placeholder="검색어를 입력하세요..." value="{{ keyword }}">
            </div>
            <div class="col-md-2">
                <select class="form-select" name="type" id="searchType">
                    <option value="all">전체</option>
                    <option value="notice">공지사항</option>
                    <option value="approval">결재문서</option>
                    <option value="user">사용자</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary w-100" id="btnSearch"
                        style="background-color: #1A4B8C; border-color: #1A4B8C;">
                    <i class="bi bi-search"></i> 검색
                </button>
            </div>
        </form>
    </div>
</div>

<div id="searchResults">
    {% if keyword %}
    <div class="text-center py-4">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">검색중...</span>
        </div>
    </div>
    {% else %}
    <div class="text-center text-muted py-5">
        <i class="bi bi-search" style="font-size: 48px;"></i>
        <p class="mt-2">검색어를 입력하세요.</p>
    </div>
    {% endif %}
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    function doSearch() {
        var keyword = $('#searchKeyword').val();
        var type = $('#searchType').val();
        if (!keyword) return;

        $('#searchResults').html('<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>');

        $.ajax({
            url: '/api/search',
            data: { keyword: keyword, type: type },
            success: function(data) {
                var html = '<div class="card"><div class="card-header">';
                html += '<strong>"' + data.keyword + '"</strong> 검색 결과: ' + data.total + '건';
                html += '</div><div class="card-body p-0">';

                if (data.results.length === 0) {
                    html += '<div class="text-center text-muted py-4">검색 결과가 없습니다.</div>';
                } else {
                    html += '<table class="table table-hover mb-0">';
                    html += '<thead class="table-light"><tr><th>유형</th><th>제목/이름</th><th>상세</th><th>날짜</th></tr></thead><tbody>';
                    data.results.forEach(function(item) {
                        var typeLabel = {'notice': '공지사항', 'approval': '결재', 'user': '사용자'}[item.type] || item.type;
                        var title = item.title || item.first_name || item.username || '-';
                        var detail = item.department || item.status || item.email || '';
                        var date = item.created_at ? item.created_at.substring(0, 10) : '';
                        html += '<tr><td><span class="badge bg-info">' + typeLabel + '</span></td>';
                        html += '<td>' + title + '</td><td>' + detail + '</td><td>' + date + '</td></tr>';
                    });
                    html += '</tbody></table>';
                }
                html += '</div></div>';
                $('#searchResults').html(html);
            },
            error: function(xhr) {
                $('#searchResults').html('<div class="alert alert-danger">검색 중 오류가 발생했습니다.</div>');
            }
        });
    }

    $('#btnSearch').click(doSearch);
    $('#searchKeyword').keypress(function(e) { if (e.which === 13) { e.preventDefault(); doSearch(); } });

    {% if keyword %}
    doSearch();
    {% endif %}
});
</script>
{% endblock %}
