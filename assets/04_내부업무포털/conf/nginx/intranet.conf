# /etc/nginx/sites-available/intranet.conf
# 발도리아 행정안전부 내부 업무 포털 Nginx 설정

# log_format은 http 블록 레벨에 위치해야 함 (server 블록 안에 넣으면 Nginx 시작 실패)
log_format detailed '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

server {
    listen 80;
    server_name intranet.mois.local 192.168.100.10;

    # 포트 80은 8080으로 리다이렉트
    # 내부망이므로 TLS 미적용
    return 301 http://$host:8080$request_uri;
}

server {
    listen 8080;
    server_name intranet.mois.local 192.168.100.10;

    client_max_body_size 20M;

    # 정적 파일
    location /static/ {
        alias /var/www/intranet/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/intranet-portal/src/intranet_portal/media/;
    }

    # Django 애플리케이션
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60;
        proxy_read_timeout 120;
    }

    # 로그
    access_log /var/log/nginx/intranet-access.log detailed;
    error_log /var/log/nginx/intranet-error.log warn;
}
