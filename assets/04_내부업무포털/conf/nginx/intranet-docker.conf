# Docker 테스트용 Nginx 설정
# log_format은 http 블록 레벨에 위치해야 함 (이 파일은 http 블록 안에 include됨)
log_format detailed '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time $upstream_response_time';

server {
    listen 80;
    listen 8080;
    server_name intranet.mois.local 192.168.100.10 localhost;

    client_max_body_size 20M;

    # Docker 테스트에서는 HTTP로 직접 서빙
    location / {
        proxy_pass http://portal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60;
        proxy_read_timeout 120;
    }

    access_log /var/log/nginx/intranet-access.log detailed;
    error_log /var/log/nginx/intranet-error.log warn;
}
