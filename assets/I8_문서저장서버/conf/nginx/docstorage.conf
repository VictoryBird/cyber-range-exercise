# ============================================================
# Nginx 설정 -- 문서 저장 서버 (192.168.110.12)
# /etc/nginx/sites-available/docstorage
# ============================================================

server {
    listen 80;
    server_name docs.mnd.local 192.168.110.12;

    client_max_body_size 50M;

    # 정적 파일
    location /static/ {
        alias /opt/docstorage/static/;
        expires 1d;
    }

    # FastAPI 리버스 프록시
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/docstorage-access.log;
    error_log /var/log/nginx/docstorage-error.log;
}
