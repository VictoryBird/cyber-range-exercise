# =============================================================================
# Redis 설정 — 민원 처리 서버 (자산 06)
# Celery 작업 큐 브로커 + 결과 백엔드
# =============================================================================

# --- 네트워크 ---
# [취약 설정] VULN-06-03: 모든 인터페이스에 바인딩
# 올바른 구현: bind 127.0.0.1 (로컬 전용) 또는 특정 인터페이스
bind 0.0.0.0

port 6379

# [취약 설정] VULN-06-03: 보호 모드 비활성화
# 올바른 구현: protected-mode yes
protected-mode no

# [취약 설정] VULN-06-03: 인증 미설정
# 올바른 구현: requirepass StrongRedisPassword123!
# requirepass

# TCP backlog
tcp-backlog 511
timeout 0
tcp-keepalive 300

# --- 일반 ---
daemonize no
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log
databases 16

# --- 영속성 (RDB) ---
save 900 1
save 300 10
save 60 10000

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /var/lib/redis

# --- 위험한 명령어 ---
# [취약 설정] VULN-06-03: 위험한 명령어 비활성화 안 됨
# 올바른 구현:
# rename-command CONFIG ""
# rename-command SLAVEOF ""
# rename-command DEBUG ""
# rename-command FLUSHALL ""
# rename-command MODULE ""

# --- 메모리 ---
maxmemory 256mb
maxmemory-policy allkeys-lru

# --- 클라이언트 ---
maxclients 100
