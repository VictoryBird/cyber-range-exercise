# ============================================================
# Nginx 설정 -- 패치 관리 서버 (192.168.120.10)
# /etc/nginx/sites-available/update-server
# [취약 설정] VULN-I9-04: HTTP 평문 전송 -- HTTPS 미사용
#   정상 구현: TLS 인증서 적용, HTTP -> HTTPS 리다이렉트
# ============================================================

server {
    listen 80;
    server_name update.mnd.local 192.168.120.10;

    root /var/www/update-server;
    index index.html;

    # 업데이트 파일 서빙 (정적)
    # [취약 설정] VULN-I9-04: HTTP 평문으로 패치 파일 전송 -- MITM 공격 가능
    #   정상 구현: HTTPS (TLS 1.2+) 적용
    location /updates/ {
        alias /var/www/update-server/updates/;
        autoindex off;

        # 다운로드 로그 (Nginx access log로 추적)
        access_log /var/log/nginx/update-download.log;
    }

    # 관리자 패널 (PHP)
    location /admin/ {
        alias /var/www/update-server/admin/;
        index login.php;

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    # 기본 페이지
    location / {
        return 301 /admin/;
    }

    # 로그
    access_log /var/log/nginx/update-access.log;
    error_log /var/log/nginx/update-error.log;
}
