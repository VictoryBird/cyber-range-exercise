# 블루팀 분석용 로그 포맷
log_format minwon_detailed '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'rt=$request_time upload=$content_length';

server {
    listen 80;
    server_name minwon.mois.valdoria.gov 203.238.140.12 localhost;

    root /var/www/minwon;
    index index.html;

    access_log /var/log/nginx/minwon-access.log minwon_detailed;
    error_log /var/log/nginx/minwon-error.log;

    client_max_body_size 55m;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
