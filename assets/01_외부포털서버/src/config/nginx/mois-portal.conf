# ============================================================
# 외부 포털 서버 — Nginx 설정
# 도메인: www.mois.valdoria.gov
# IP: 203.238.140.10
#
# [취약 설정] /docs, /openapi.json 경로 차단 누락
# [취약 설정] 포트 8000 직접 접근 허용 (방화벽 레벨)
# ============================================================

# 블루팀 분석용 상세 로그 포맷 (http 블록 레벨)
log_format mois_combined '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'rt=$request_time';

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name www.mois.valdoria.gov 203.238.140.10 localhost;

    # Docker 테스트 시 HTTP로 직접 접근 허용
    root /opt/mois-portal/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /docs { proxy_pass http://127.0.0.1:8000; }
    location /redoc { proxy_pass http://127.0.0.1:8000; }
    location /openapi.json { proxy_pass http://127.0.0.1:8000; }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS 서버
server {
    listen 443 ssl;
    server_name www.mois.valdoria.gov 203.238.140.10;

    # TLS 인증서 (자체 서명)
    ssl_certificate     /etc/nginx/ssl/mois-portal.crt;
    ssl_certificate_key /etc/nginx/ssl/mois-portal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/mois-portal-access.log mois_combined;
    error_log  /var/log/nginx/mois-portal-error.log;

    # React SPA 정적 파일
    root /opt/mois-portal/frontend/dist;
    index index.html;

    # 정적 파일 캐싱
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API 프록시 → FastAPI (Uvicorn)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # [취약 설정] Swagger UI 접근 허용 — 차단해야 하지만 의도적으로 프록시
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # [취약 설정] OpenAPI 스펙 노출
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # [취약 설정 힌트] robots.txt에 민감 경로 나열
    location /robots.txt {
        alias /opt/mois-portal/frontend/dist/robots.txt;
    }

    # SPA 라우팅 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }
}
