services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: portal_app
      POSTGRES_PASSWORD: "P0rtal#DB@2026!"
      POSTGRES_DB: mois_portal
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_app -d mois_portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  portal:
    image: mois-portal:latest
    build: .
    ports:
      - "80:80"
      - "443:443"
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mois_portal
      - DB_USER=portal_app
      - DB_PASSWORD=P0rtal#DB@2026!
      - LOG_FILE=/var/log/mois-portal/app.log
    depends_on:
      db:
        condition: service_healthy
