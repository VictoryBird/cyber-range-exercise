# ============================================================
# Dovecot 메일 저장 설정 -- 군 웹메일 서버
# ============================================================

mail_location = maildir:/var/mail/vhosts/%d/%n
namespace inbox {
  inbox = yes
}

mail_uid = 5000
mail_gid = 5000
mail_privileged_group = mail

first_valid_uid = 5000
last_valid_uid = 5000
