# ============================================================
# Dovecot 인증 설정 -- 군 웹메일 서버
# ============================================================

disable_plaintext_auth = no
# [취약 설정] 평문 인증 허용 -- 네트워크 스니핑 시 비밀번호 노출
#   정상 설정: disable_plaintext_auth = yes

auth_mechanisms = plain login

# passwd-file 인증 (AD 미가용 시 폴백)
!include auth-passwdfile.conf.ext

# LDAP/AD 인증 (기본)
#!include auth-ldap.conf.ext
