version: "3.8"

services:
  influxdb:
    image: influxdb:2.7
    container_name: historian-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=historian-admin-2024
      - DOCKER_INFLUXDB_INIT_ORG=ot-org
      - DOCKER_INFLUXDB_INIT_BUCKET=ot_data
      - DOCKER_INFLUXDB_INIT_RETENTION=720h
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=historian-dev-token-2024
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  historian-api:
    image: historian-api:latest
    container_name: historian-api
    build: .
    ports:
      - "8000:8000"
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=historian-dev-token-2024
      - INFLUXDB_ORG=ot-org
      - INFLUXDB_BUCKET=ot_data
      - SCADA_HOST=192.168.201.10
      - SCADA_PORT=502
    depends_on:
      influxdb:
        condition: service_healthy

  seed:
    image: historian-api:latest
    container_name: historian-seed
    build: .
    entrypoint: ["python", "/opt/historian/scripts/seed_data.py"]
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=historian-dev-token-2024
      - INFLUXDB_ORG=ot-org
      - INFLUXDB_BUCKET=ot_data
    volumes:
      - ./scripts:/opt/historian/scripts:ro
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb-data:
  influxdb-config:
