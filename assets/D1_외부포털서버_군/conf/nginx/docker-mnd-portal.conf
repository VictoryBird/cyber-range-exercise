# ============================================================
# D1 외부 포털 서버 — Docker 테스트용 Nginx 설정 (HTTP only)
# ============================================================

server {
    listen 80;
    server_name localhost www.mnd.valdoria.mil;

    access_log /var/log/nginx/mnd-portal-access.log;
    error_log  /var/log/nginx/mnd-portal-error.log;

    root /var/www/mnd-portal;
    index index.html;

    location /css/ {
        alias /var/www/mnd-portal/css/;
        expires 7d;
    }

    location /js/ {
        alias /var/www/mnd-portal/js/;
        expires 7d;
    }

    location /images/ {
        alias /var/www/mnd-portal/images/;
        expires 7d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
