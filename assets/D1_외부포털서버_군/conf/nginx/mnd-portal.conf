# ============================================================
# D1 외부 포털 서버 — Nginx 설정
# Domain: www.mnd.valdoria.mil (211.57.64.10)
# ============================================================

# log_format은 http 블록 레벨에 위치해야 함 (server 블록 안에 넣으면 Nginx 시작 실패)
log_format mnd_portal '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      '$request_time $upstream_response_time';

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name www.mnd.valdoria.mil;

    # Docker 테스트용: HTTP에서도 서비스 제공
    # 프로덕션에서는 아래 return 301 만 유지
    # return 301 https://$host$request_uri;

    access_log /var/log/nginx/mnd-portal-access.log mnd_portal;
    error_log  /var/log/nginx/mnd-portal-error.log;

    # 정적 파일 직접 서빙
    location /static/ {
        alias /var/www/mnd-portal/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /css/ {
        alias /var/www/mnd-portal/css/;
        expires 7d;
    }

    location /js/ {
        alias /var/www/mnd-portal/js/;
        expires 7d;
    }

    location /images/ {
        alias /var/www/mnd-portal/images/;
        expires 7d;
    }

    # 메인 페이지 및 HTML 파일
    location / {
        root /var/www/mnd-portal;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Tomcat 프록시 (Spring 애플리케이션 — .do 확장자)
    location ~ \.do$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # JSP 파일 프록시 (Tomcat)
    location ~ \.jsp$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS 서버 (프로덕션)
server {
    listen 443 ssl;
    server_name www.mnd.valdoria.mil;

    ssl_certificate     /etc/nginx/ssl/mnd_valdoria_mil.crt;
    ssl_certificate_key /etc/nginx/ssl/mnd_valdoria_mil.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/mnd-portal-ssl-access.log mnd_portal;
    error_log  /var/log/nginx/mnd-portal-ssl-error.log;

    # 정적 파일 직접 서빙
    location /static/ {
        alias /var/www/mnd-portal/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /css/ {
        alias /var/www/mnd-portal/css/;
        expires 7d;
    }

    location /js/ {
        alias /var/www/mnd-portal/js/;
        expires 7d;
    }

    location /images/ {
        alias /var/www/mnd-portal/images/;
        expires 7d;
    }

    # 메인 페이지 및 HTML 파일
    location / {
        root /var/www/mnd-portal;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Tomcat 프록시 (Spring 애플리케이션 — .do 확장자)
    location ~ \.do$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # JSP 파일 프록시 (Tomcat)
    location ~ \.jsp$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
