# ============================================================
# Tanner 분석 엔진 설정 — D5 (211.57.64.14)
# SNARE가 수신한 웹 요청을 분석하고 취약점 에뮬레이션을 수행한다.
# ============================================================

TANNER:
  HOST: "0.0.0.0"
  PORT: 8090
  REDIS:
    HOST: "redis"
    PORT: 6379
    DB: 0
  EMULATORS:
    # SQL Injection 에뮬레이션
    sqli:
      enabled: true
      db_name: "mil_management.db"
      type: "SQLITE"
    # Local File Inclusion 에뮬레이션
    lfi:
      enabled: true
      root_dir: "/opt/tanner/data/lfi_root"
    # Remote File Inclusion 에뮬레이션
    rfi:
      enabled: true
    # XSS 에뮬레이션
    xss:
      enabled: true
    # Command Injection 에뮬레이션
    cmd_exec:
      enabled: true
  LOGGING:
    log_file: "/var/log/tanner/tanner.log"
    level: "DEBUG"
  ANALYSIS:
    # 공격 유형 분류
    classify: true
    # PCAP 저장
    save_pcap: false
