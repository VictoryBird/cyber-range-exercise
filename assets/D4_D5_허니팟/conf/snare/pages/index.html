<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>군 정보시스템 관리 포털</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        .header { background: #1a3a5c; color: white; padding: 20px; text-align: center; }
        .login-box { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .login-box h2 { text-align: center; color: #1a3a5c; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 3px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 10px; background: #1a3a5c; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .footer { text-align: center; color: #999; margin-top: 30px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>국방부 정보시스템 관리 포털</h1>
        <p>MND Information System Management Portal</p>
    </div>
    <div class="login-box">
        <h2>로그인</h2>
        <form action="/login.php" method="POST">
            <input type="text" name="username" placeholder="사용자 ID" />
            <input type="password" name="password" placeholder="비밀번호" />
            <button type="submit">로그인</button>
        </form>
        <p style="text-align:center; font-size:12px; color:#999;">
            문의: IT지원팀 (042-550-xxxx)
        </p>
    </div>
    <div class="footer">
        <p>&copy; 2026 Ministry of National Defense, Valdoria. All rights reserved.</p>
    </div>
</body>
</html>
