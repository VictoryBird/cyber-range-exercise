version: '3.8'

# D4-D5 허니팟 (SSH + Web)
# D4: Cowrie SSH 허니팟 (211.57.64.13, port 22)
# D5: SNARE/Tanner Web 허니팟 (211.57.64.14, port 80/443)
#
# 참고: 이 docker-compose는 단일 호스트 테스트용이다.
# 실제 배포 시 D4(211.57.64.13)와 D5(211.57.64.14)는 별도 VM에서 운영한다.
# 단일 VM 테스트 시 포트 충돌에 주의할 것.

services:
  # ── D4: Cowrie SSH 허니팟 ──
  cowrie:
    image: cowrie/cowrie:latest             # 명시적 이미지 이름 (한글 디렉토리 대응)
    container_name: cowrie-ssh
    restart: unless-stopped
    ports:
      - "${COWRIE_SSH_PORT:-22}:2222"       # 외부 22 → 내부 2222
    volumes:
      - ./conf/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./conf/cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
      - cowrie_logs:/cowrie/cowrie-git/var/log/cowrie
      - cowrie_downloads:/cowrie/cowrie-git/var/lib/cowrie/downloads
      - cowrie_tty:/cowrie/cowrie-git/var/lib/cowrie/tty
    environment:
      - COWRIE_TELNET_ENABLED=no
    networks:
      - honeypot-ssh

  # ── D5: Tanner 분석 엔진 (백엔드) ──
  redis:
    image: redis:7-alpine
    container_name: tanner-redis
    restart: unless-stopped
    networks:
      - honeypot-web

  tanner:
    image: mushorg/tanner:latest           # 명시적 이미지 이름
    container_name: tanner
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      - ./conf/tanner/tanner.cfg:/opt/tanner/config/tanner.cfg:ro
      - tanner_logs:/var/log/tanner
      - tanner_data:/opt/tanner/data
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - honeypot-web

  # ── D5: SNARE 웹 센서 (프론트엔드) ──
  snare:
    image: mushorg/snare:latest            # 명시적 이미지 이름
    container_name: snare
    restart: unless-stopped
    depends_on:
      - tanner
    ports:
      - "${SNARE_HTTP_PORT:-80}:80"
      - "${SNARE_HTTPS_PORT:-443}:443"
    volumes:
      - ./conf/snare/pages:/opt/snare/pages:ro
      - snare_logs:/opt/snare/logs
    command: >
      --tanner-host tanner
      --tanner-port 8090
      --host-ip 0.0.0.0
      --port 80
      --page-dir /opt/snare/pages
    networks:
      - honeypot-web

volumes:
  cowrie_logs:
  cowrie_downloads:
  cowrie_tty:
  tanner_logs:
  tanner_data:
  snare_logs:

networks:
  honeypot-ssh:
    driver: bridge
  honeypot-web:
    driver: bridge
