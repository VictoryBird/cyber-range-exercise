# =============================================================
# Nginx Configuration — Asset 01: 외부 포털 서버
# Server: 192.168.92.201 (www.mois.valdoria.gov)
#
# This file is deployed to /etc/nginx/sites-available/mois-portal
# and symlinked to /etc/nginx/sites-enabled/
# =============================================================

# log_format must be at http block level.
# Since sites-available files are included inside the http {} block,
# placing it at the top of this file is correct.
log_format detailed '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

# --- HTTP (port 80) → HTTPS redirect ---
server {
    listen 80;
    server_name www.mois.valdoria.gov 192.168.92.201;

    # robots.txt served directly even on HTTP
    location = /robots.txt {
        alias /opt/mois-portal/static/robots.txt;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS (port 443) — main server block ---
server {
    listen 443 ssl;
    server_name www.mois.valdoria.gov 192.168.92.201;

    # ---------- TLS (self-signed) ----------
    ssl_certificate     /etc/nginx/ssl/mois-portal.crt;
    ssl_certificate_key /etc/nginx/ssl/mois-portal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ---------- Logging ----------
    access_log /var/log/nginx/mois-portal-access.log detailed;
    error_log  /var/log/nginx/mois-portal-error.log warn;

    # ---------- Common ----------
    client_max_body_size 20M;

    # ---------- robots.txt ----------
    location = /robots.txt {
        alias /opt/mois-portal/static/robots.txt;
        access_log off;
    }

    # ---------- API proxy → FastAPI (127.0.0.1:8000) ----------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # [취약점] VULN-WEB-03: Swagger/OpenAPI 문서가 외부에 노출됨
    # 올바른 설정: /docs, /redoc, /openapi.json 경로를 차단하거나
    # IP 기반 접근 제어를 적용해야 함
    # location /docs { deny all; return 403; }
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Frontend proxy → Next.js (127.0.0.1:3000) ----------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    # ---------- Next.js static assets ----------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
