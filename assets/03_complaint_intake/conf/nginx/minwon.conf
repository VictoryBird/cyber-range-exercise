server {
    listen 80;
    server_name minwon.mois.valdoria.gov 192.168.92.203;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name minwon.mois.valdoria.gov 192.168.92.203;

    ssl_certificate     /etc/nginx/ssl/minwon.crt;
    ssl_certificate_key /etc/nginx/ssl/minwon.key;

    access_log /var/log/nginx/minwon_access.log combined;
    error_log  /var/log/nginx/minwon_error.log warn;

    root /var/www/minwon;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }
}
